# 在 GitHub 云端 Linux 上调用 Qt 官方工具链打包 APK（Windows 本机无法执行 pyside6-android-deploy）
name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages (buildozer / NDK 常见依赖)
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git zip unzip wget curl autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev \
            patchelf ccache

      - name: Install PySide6 Linux wheels + 项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install "PySide6==6.10.3" "httpx>=0.27" "dashscope>=1.20" "numpy>=1.24" "python-dotenv>=1.0"

      - name: Install pyside6-android-deploy 依赖（含 pkginfo 等）
        run: |
          pip install -r "$(python -c "import pathlib, PySide6; print(pathlib.Path(PySide6.__file__).resolve().parent / 'scripts' / 'requirements-android.txt')")"

      - name: Check android deploy script（仅 Linux wheel 附带）
        run: |
          python << 'PY'
          import pathlib
          import PySide6
          p = pathlib.Path(PySide6.__file__).resolve().parent / "scripts" / "android_deploy.py"
          print("android_deploy.py:", p)
          if not p.is_file():
              raise SystemExit("未找到 android_deploy.py。请把 PySide6 升到 6.10.x 或查看 Qt 文档。")
          print("ok")
          PY

      - name: Download PySide6 / Shiboken6 Android wheels (aarch64, Python 3.11)
        run: |
          mkdir -p wheels
          wget -nv -O wheels/PySide6_android_aarch64.whl \
            "https://download.qt.io/official_releases/QtForPython/pyside6/PySide6-6.10.3-6.10.3-cp311-cp311-android_aarch64.whl"
          wget -nv -O wheels/shiboken6_android_aarch64.whl \
            "https://download.qt.io/official_releases/QtForPython/shiboken6/shiboken6-6.10.3-6.10.3-cp311-cp311-android_aarch64.whl"

      # Qt 自带下载脚本在 CI 里经常无法被 deploy 自动识别；用官方 action 安装 SDK/NDK 并显式传参
      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'ndk;26.1.10909125 platforms;android-34 build-tools;35.0.0 platform-tools'

      # buildozer / python-for-android 仍查找已废弃的 tools/bin/sdkmanager（新 SDK 在 cmdline-tools/*/bin/）
      - name: 兼容 buildozer 的旧版 sdkmanager 路径
        run: |
          set -euo pipefail
          SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/.android/sdk}}"
          SM=""
          if command -v sdkmanager >/dev/null 2>&1; then
            SM="$(command -v sdkmanager)"
          fi
          if [ -z "${SM}" ] || [ ! -f "${SM}" ]; then
            SM="$(find "${SDK}/cmdline-tools" -type f -name sdkmanager 2>/dev/null | head -1)"
          fi
          if [ -z "${SM}" ] || [ ! -f "${SM}" ]; then
            echo "未找到 sdkmanager"
            find "${SDK}" -maxdepth 5 -name sdkmanager 2>/dev/null || true
            exit 1
          fi
          echo "Using sdkmanager: ${SM}"
          mkdir -p "${SDK}/tools/bin"
          ln -sfn "${SM}" "${SDK}/tools/bin/sdkmanager"
          "${SDK}/tools/bin/sdkmanager" --version

      - name: Run pyside6-android-deploy（debug APK）
        env:
          WS: ${{ github.workspace }}
        run: |
          set -euo pipefail
          SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/.android/sdk}}"
          if [ -z "${SDK}" ] || [ ! -d "${SDK}" ]; then
            echo "未找到 Android SDK 目录（ANDROID_SDK_ROOT / ANDROID_HOME / ~/.android/sdk）"
            exit 1
          fi
          # 与上面 sdkmanager 安装的 NDK 版本一致
          NDK_VER="26.1.10909125"
          NDK_ROOT="${SDK}/ndk/${NDK_VER}"
          if [ ! -d "${NDK_ROOT}" ]; then
            echo "在 ${SDK}/ndk 下查找 NDK…"
            ls -la "${SDK}/ndk" || true
            NDK_ROOT="$(find "${SDK}/ndk" -mindepth 1 -maxdepth 1 -type d | head -1)"
          fi
          if [ -z "${NDK_ROOT}" ] || [ ! -d "${NDK_ROOT}/toolchains/llvm/prebuilt" ]; then
            echo "无法解析 NDK 根目录"
            exit 1
          fi
          echo "ANDROID_SDK_ROOT=${SDK}"
          echo "NDK_ROOT=${NDK_ROOT}"

          # 工具要求：在「应用根目录」执行，且入口文件名为 main.py（与 app/ 同级）
          if [ -f "$WS/main.py" ] && [ -d "$WS/app" ]; then
            ROOT="$WS"
          elif [ -f "$WS/ASR/main.py" ] && [ -d "$WS/ASR/app" ]; then
            ROOT="$WS/ASR"
          else
            echo "未找到应用根目录（需要同时存在 main.py 与 app/）"
            find "$WS" -maxdepth 4 -name main.py -print || true
            exit 1
          fi
          echo "PROJECT_ROOT=$ROOT"
          ls -la "$ROOT/main.py" "$ROOT/app"
          cd "$ROOT"
          pyside6-android-deploy -f -v \
            --name "ASRRecorder" \
            --sdk-path="${SDK}" \
            --ndk-path="${NDK_ROOT}" \
            --wheel-pyside="$WS/wheels/PySide6_android_aarch64.whl" \
            --wheel-shiboken="$WS/wheels/shiboken6_android_aarch64.whl" \
            --extra-ignore-dirs=.venv,.git,build,.idea,.github \
            --keep-deployment-files

          echo "==== 部署后立即在应用目录查找 .apk ===="
          find "$ROOT" -name "*.apk" -ls 2>/dev/null || true
          ls -la "$ROOT/bin" 2>/dev/null || true

      - name: 收集 APK 并上传（无文件则失败）
        run: |
          set -euo pipefail
          WS="${{ github.workspace }}"
          OUT="$WS/_apk_out"
          mkdir -p "$OUT"
          # buildozer 常见：应用根目录 bin/ 或 .buildozer 下
          find "$WS" -type f -name "*.apk" 2>/dev/null | while read -r f; do
            cp -v "$f" "$OUT/"
          done
          echo "==== _apk_out 内容 ===="
          ls -la "$OUT" || true
          n="$(find "$OUT" -type f -name '*.apk' 2>/dev/null | wc -l)"
          if [ "${n}" -eq 0 ]; then
            echo "::error::未找到任何 APK。请打开上一步「Run pyside6-android-deploy」完整日志，查看 buildozer 是否报错或未完成编译。"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: asr-android-debug-apk
          path: _apk_out/*.apk
          if-no-files-found: error
