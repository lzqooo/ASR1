# 在 GitHub 云端 Linux 上调用 Qt 官方工具链打包 APK（Windows 本机无法执行 pyside6-android-deploy）
name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages (buildozer / NDK 常见依赖)
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git zip unzip wget curl autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev \
            patchelf ccache

      - name: Install PySide6 Linux wheels + 项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install "PySide6==6.10.3" "httpx>=0.27" "dashscope>=1.20" "numpy>=1.24" "python-dotenv>=1.0"

      - name: Check android deploy script（仅 Linux wheel 附带）
        run: |
          python << 'PY'
          import pathlib
          import PySide6
          p = pathlib.Path(PySide6.__file__).resolve().parent / "scripts" / "android_deploy.py"
          print("android_deploy.py:", p)
          if not p.is_file():
              raise SystemExit("未找到 android_deploy.py。请把 PySide6 升到 6.10.x 或查看 Qt 文档。")
          print("ok")
          PY

      - name: Download PySide6 / Shiboken6 Android wheels (aarch64, Python 3.11)
        run: |
          mkdir -p wheels
          wget -nv -O wheels/PySide6_android_aarch64.whl \
            "https://download.qt.io/official_releases/QtForPython/pyside6/PySide6-6.10.3-6.10.3-cp311-cp311-android_aarch64.whl"
          wget -nv -O wheels/shiboken6_android_aarch64.whl \
            "https://download.qt.io/official_releases/QtForPython/shiboken6/shiboken6-6.10.3-6.10.3-cp311-cp311-android_aarch64.whl"

      - name: Download Android SDK / NDK（Qt 官方脚本，写入用户目录缓存）
        run: |
          git clone --branch 6.10.3 --depth 1 https://code.qt.io/pyside/pyside-setup.git /tmp/pyside-setup
          cd /tmp/pyside-setup
          pip install -r requirements.txt
          if [ -f tools/cross_compile_android/requirements.txt ]; then
            pip install -r tools/cross_compile_android/requirements.txt
          fi
          python tools/cross_compile_android/main.py --download-only --skip-update --auto-accept-license

      - name: Run pyside6-android-deploy（debug APK）
        working-directory: ${{ github.workspace }}
        run: |
          pyside6-android-deploy -f \
            --name "ASRRecorder" \
            --wheel-pyside="${{ github.workspace }}/wheels/PySide6_android_aarch64.whl" \
            --wheel-shiboken="${{ github.workspace }}/wheels/shiboken6_android_aarch64.whl" \
            --extra-ignore-dirs=.venv,.git,build,.idea,.github \
            --keep-deployment-files

      - name: List APK
        if: always()
        run: find "${{ github.workspace }}" -name "*.apk" -ls || true

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: asr-android-debug-apk
          path: "**/*.apk"
          if-no-files-found: warn
